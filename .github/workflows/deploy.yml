name: Build and Push 21oss to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Native arm64 runner — match Dokploy VPS arch, no QEMU needed
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image tag
        id: set_tag
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=$IMAGE_LOWER" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.set_tag.outputs.image_tag }}:latest
            ${{ steps.set_tag.outputs.image_tag }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # arm64 native runner — Dokploy VPS = arm64
          platforms: linux/arm64
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.21oss.com' }}
            NEXT_PUBLIC_SITE_EMAIL=${{ vars.NEXT_PUBLIC_SITE_EMAIL || 'brokariim@gmail.com' }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST || 'https://us.i.posthog.com' }}
            NEXT_PUBLIC_POSTHOG_API_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_API_KEY || 'phc_82lC' }}

      - name: Trigger Dokploy deployment webhook
        env:
          DOKPLOY_DEPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DOKPLOY_DEPLOY_WEBHOOK_URL" ]; then
            echo "DOKPLOY_DEPLOY_WEBHOOK_URL not set, skip deploy webhook"
            exit 0
          fi

          curl -fsS -X POST "$DOKPLOY_DEPLOY_WEBHOOK_URL"

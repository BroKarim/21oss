name: Build and Deploy 21oss to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image tag
        id: set_tag
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=$IMAGE_LOWER" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.set_tag.outputs.image_tag }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}:latest"

            # Login GHCR
            if [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "❌ GHCR_TOKEN belum di-set di GitHub Secrets"
              exit 1
            fi
            GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            if [ -z "$GHCR_USERNAME" ]; then
              GHCR_USERNAME="${{ secrets.VPS_USERNAME }}"
            fi
            if [ -z "$GHCR_USERNAME" ]; then
              echo "❌ GHCR_USERNAME/VPS_USERNAME kosong"
              exit 1
            fi
            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            # Pull dulu — kalau gagal STOP, jangan sentuh container lama
            sudo docker pull $IMAGE_TAG || { echo "❌ Pull failed, aborting deploy"; exit 1; }

            # Baru stop dan replace container lama
            sudo docker stop dzenn-app || true
            sudo docker rm dzenn-app || true

            # Pastikan network tersedia
            sudo docker network inspect dzenn_default >/dev/null 2>&1 || sudo docker network create dzenn_default

            sudo docker run -d \
              --name dzenn-app \
              --restart unless-stopped \
              --network dzenn_default \
              -p 3000:3000 \
              --env-file /var/www/21oss/.env \
              $IMAGE_TAG

            # Bersihkan image lama yang tidak terpakai (biar SSD 60GB gak penuh)
            sudo docker image prune -af
            echo "✅ Deploy sukses: $IMAGE_TAG"

services:
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: openlayout-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - dokploy-network

volumes:
  meili_data:

networks:
  dokploy-network:
    external: true
